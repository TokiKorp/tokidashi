name: 'publish'

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate-rust-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check Rust code
        run: cargo check --manifest-path src-tauri/Cargo.toml

  publish-tauri:
    needs: validate-rust-linux
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        if: github.ref == 'refs/heads/main'
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Release Tag
        id: get_tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=${{ steps.tag_version.outputs.new_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.get_tag.outputs.tag != ''
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        if: steps.get_tag.outputs.tag != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        if: steps.get_tag.outputs.tag != ''
        run: npm ci

      - name: Build and release
        if: steps.get_tag.outputs.tag != ''
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.get_tag.outputs.tag }}
          releaseName: 'Tokidachi ${{ steps.get_tag.outputs.tag }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      - name: Update Homebrew Cask
        if: steps.get_tag.outputs.tag != ''
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN is not set. Skipping automated Homebrew Cask update."
            echo "To enable automatic updates, create a GitHub Personal Access Token (PAT) with repo scope,"
            echo "add it as a secret named TAP_GITHUB_TOKEN in this repository, and ensure the"
            echo "public tap repository 'basilelt/homebrew-tap' exists."
            exit 0
          fi

          # Extract version from tag (e.g., v0.1.0 -> 0.1.0)
          TAG="${{ steps.get_tag.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "Releasing version: $VERSION"

          # Find the built DMG file in the workspace
          DMG_PATH=$(find src-tauri/target -name "*.dmg" | grep -v "dependency" | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            echo "Error: No DMG bundle found."
            exit 1
          fi

          DMG_FILENAME=$(basename "$DMG_PATH")
          echo "Found DMG: $DMG_FILENAME at $DMG_PATH"

          # Calculate SHA256 of the DMG
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          echo "Calculated SHA256: $SHA256"

          # Transform filename for the Ruby template (replacing version with #{version})
          # e.g., Tokidachi_0.1.0_universal.dmg -> Tokidachi_#{version}_universal.dmg
          URL_FILENAME=$(echo "$DMG_FILENAME" | sed "s/${VERSION}/#{version}/g")
          echo "Cask download filename: $URL_FILENAME"

          # Clone the tap repository
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/basilelt/homebrew-tap.git" homebrew-tap
          cd homebrew-tap

          # Create Casks folder if not exists
          mkdir -p Casks

          # Write the Cask formula
          cat <<EOF > Casks/tokidachi.rb
          cask "tokidachi" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/oncleguigs/tokidachi/releases/download/v#{version}/${URL_FILENAME}"
            name "Tokidachi"
            desc "Desktop companion idle + care"
            homepage "https://github.com/oncleguigs/tokidachi"

            app "Tokidachi.app"

            zap trash: [
              "~/Library/Application Support/fr.guillaume.tokidachi",
              "~/Library/Preferences/fr.guillaume.tokidachi.plist",
              "~/Library/Saved Application State/fr.guillaume.tokidachi.savedState",
            ]
          end
          EOF

          # Configure Git and push
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/tokidachi.rb
          git commit -m "Update Tokidachi cask to v${VERSION}" || echo "No changes to commit"
          git push origin main
